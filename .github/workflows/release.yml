name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Telegram build started
        shell: bash
        run: |
          TIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          MSG=$(printf "\xF0\x9F\x94\xA8 FocusForge ${{ github.ref_name }} build started at $TIME")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$MSG"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Write signing key to file
        shell: pwsh
        run: |
          $keyContent = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          $keyPath = "$env:RUNNER_TEMP\focusforge.key"
          Set-Content -Path $keyPath -Value $keyContent -NoNewline
          echo "SIGNING_KEY_PATH=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build and release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.SIGNING_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: FocusForge ${{ github.ref_name }}
          releaseBody: Release ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false

      - name: List bundle output
        shell: pwsh
        run: |
          Write-Host "=== Bundle directory contents ==="
          Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse | ForEach-Object { Write-Host $_.FullName }

      - name: Upload updater artifacts
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "virusescu/focusforge"
          $bundleDir = "src-tauri/target/release/bundle/nsis"

          $nsisZip = Get-ChildItem -Path $bundleDir -Filter "*.nsis.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          $nsisSig = Get-ChildItem -Path $bundleDir -Filter "*.nsis.zip.sig" -ErrorAction SilentlyContinue | Select-Object -First 1

          if (-not $nsisZip -or -not $nsisSig) {
            Write-Error "Could not find .nsis.zip or .nsis.zip.sig in $bundleDir"
            exit 1
          }

          Write-Host "Uploading $($nsisZip.Name) and $($nsisSig.Name)"
          gh release upload $tag $nsisZip.FullName $nsisSig.FullName --repo $repo --clobber

      - name: Generate update.json
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $repo = "virusescu/focusforge"
          $tag = "${{ github.ref_name }}"
          $bundleDir = "src-tauri/target/release/bundle/nsis"

          $nsisZip = Get-ChildItem -Path $bundleDir -Filter "*.nsis.zip" | Select-Object -First 1
          $nsisSig = Get-ChildItem -Path $bundleDir -Filter "*.nsis.zip.sig" | Select-Object -First 1

          $sigContent = (Get-Content $nsisSig.FullName -Raw).Trim()
          $zipUrl = "https://github.com/$repo/releases/download/$tag/$($nsisZip.Name)"
          $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")

          $updateJson = @{
            version  = $version
            notes    = "Release v$version"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                url       = $zipUrl
                signature = $sigContent
              }
            }
          } | ConvertTo-Json -Depth 5

          Set-Content -Path "update.json" -Value $updateJson -NoNewline
          Write-Host "Generated update.json for v$version"

      - name: Commit update.json
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          git commit -m "chore: update update.json for ${{ github.ref_name }}"
          git push origin HEAD:master

      - name: Notify Telegram success
        if: success()
        shell: bash
        run: |
          MSG=$(printf "\xE2\x9C\x85 FocusForge ${{ github.ref_name }} released successfully")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$MSG"

      - name: Notify Telegram failure
        if: failure()
        shell: bash
        run: |
          MSG=$(printf "\xE2\x9D\x8C FocusForge ${{ github.ref_name }} build failed")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$MSG"
